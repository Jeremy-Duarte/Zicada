{% if messages %}
<div class="container mx-auto px-4 mt-4">
    {% for message in messages %}
    <div class="p-4 mb-4 rounded-lg {% if message.tags == 'success' %}bg-green-100 text-green-700 border-l-4 border-green-500{% elif message.tags == 'error' %}bg-red-100 text-red-700 border-l-4 border-red-500{% else %}bg-blue-100 text-blue-700 border-l-4 border-blue-500{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
