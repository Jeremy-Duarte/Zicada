{% load static %}
<title>{% block title %}Zicada - Moda Urbana Personalizada{% endblock %}</title>
<meta name="description" content="{% block description %}Zicada: Ropa única y personalizada, diseñada para expresar tu estilo. Colecciones exclusivas de streetwear en Colombia.{% endblock %}">
<meta name="keywords" content="{% block keywords %}ropa, streetwear, moda urbana, personalizada, colecciones exclusivas, Zicada, Colombia{% endblock %}">
<meta name="author" content="Zicada">
<meta name="robots" content="index, follow">

<meta property="og:type" content="website">
<meta property="og:url" content="{{ request.build_absolute_uri }}">
<meta property="og:title" content="Zicada - Moda Urbana Personalizada">
<meta property="og:description" content="Ropa única y personalizada, diseñada para expresar tu estilo.">
<meta property="og:image" content="{% static 'img/og-image.jpg' %}">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Zicada - Moda Urbana">
<meta name="twitter:description" content="Descubre nuestras colecciones exclusivas.">
<meta name="twitter:image" content="{% static 'img/twitter-card.jpg' %}">

<link rel="manifest" href="{% url 'pwa_manifest' %}">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zicada">
<link rel="apple-touch-icon" href="{% static 'icons/icon-192.png' %}">

<link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
<link rel="icon" type="image/png" sizes="32x32" href="{% static 'icons/favicon-32x32.png' %}">
<link rel="icon" type="image/png" sizes="16x16" href="{% static 'icons/favicon-16x16.png' %}">
